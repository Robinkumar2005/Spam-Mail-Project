name: CD - Build & Deploy Spam Backend to EC2

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "models/**"
      - "docker/backend.Dockerfile"
      - ".github/workflows/cd.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Multi-Arch Image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t robin109/spam-backend:latest \
            -t robin109/spam-backend:${{ github.sha }} \
            -f docker/backend.Dockerfile \
            --push .

      - name: Prepare SSH Key
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            sudo docker pull robin109/spam-backend:latest

            sudo docker rm -f spam-backend || true

            sudo docker run -d \
              --name spam-backend \
              --restart=always \
              -p 8000:8000 \
              robin109/spam-backend:latest

            sudo docker image prune -f
          EOF